    <script>
        const lenis = new Lenis({
            duration: 2,
            smoothWheel: true,
            smoothTouch: false,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }

        requestAnimationFrame(raf);
    </script>

    <script>
        const contactToggleBtn = document.getElementById('contactToggleBtn');
        const contactMenu = document.getElementById('contactMenu');
        const toggleIcon = document.getElementById('toggleIcon');
        const profileIconPath = `<path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>`;
        const closeIconPath = `<path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>`;

        contactToggleBtn.addEventListener('click', () => {
            const isHidden = contactMenu.classList.contains('hidden');

            if (isHidden) {
                contactMenu.classList.remove('hidden');
                setTimeout(() => {
                    contactMenu.classList.remove('translate-y-4', 'opacity-0');
                    contactMenu.classList.add('translate-y-0', 'opacity-100');
                }, 10);

                toggleIcon.style.transform = 'rotate(90deg)';
                setTimeout(() => { toggleIcon.innerHTML = closeIconPath; }, 150);
            } else {
                contactMenu.classList.remove('translate-y-0', 'opacity-100');
                contactMenu.classList.add('translate-y-4', 'opacity-0');
                toggleIcon.style.transform = 'rotate(0deg)';
                setTimeout(() => { toggleIcon.innerHTML = profileIconPath; }, 150);

                setTimeout(() => {
                    contactMenu.classList.add('hidden');
                }, 300);
            }
        });
        window.addEventListener('click', (e) => {
            if (!contactToggleBtn.contains(e.target) && !contactMenu.contains(e.target)) {
                if (!contactMenu.contains('hidden')) {
                    contactMenu.classList.remove('translate-y-0', 'opacity-100');
                    contactMenu.classList.add('translate-y-4', 'opacity-0');
                    toggleIcon.style.transform = 'rotate(0deg)';
                    setTimeout(() => { toggleIcon.innerHTML = profileIconPath; }, 150);
                    setTimeout(() => { contactMenu.classList.add('hidden'); }, 300);
                }
            }
        });
    </script>
